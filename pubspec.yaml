name: wisklauncher
description: WiskLauncher Mobile — cross-platform Minecraft Java Edition launcher.
publish_to: 'none'
version: 0.1.9+10

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  # HTTP + JSON
  http: ^1.2.0
  dio: ^5.4.0
  # State
  flutter_riverpod: ^2.5.1
  # Secure storage for OAuth tokens
  flutter_secure_storage: ^9.2.2
  # Filesystem paths
  path_provider: ^2.1.3
  path: ^1.9.0
  # SHA1 verification
  crypto: ^3.0.3
  # Zip extraction for natives
  archive: ^3.4.10
  # UI niceties
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  # Persisted local DB for profiles & download queue
  shared_preferences: ^2.2.3
  # url launcher for device-code verification page
  url_launcher: ^6.3.0
  # Logging
  logger: ^2.3.0
  # XML for maven-metadata.xml parsing (NeoForge)
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
